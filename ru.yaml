"2026-RS/currency/terms": "使用VII–X级坦克进行评级战斗，每场可获得条带：\n• 青铜联盟 — 每场战斗10条带，胜利额外获得1条带；\n• 白银联盟 — 每场战斗11条带，胜利额外获得2条带；\n• 黄金联盟 — 每场战斗13条带，胜利额外获得3条带；\n• 白金联盟 — 每场战斗16条带，胜利额外获得6条带；\n• 钻石联盟 — 每场战斗20条带，胜利额外获得10条带。\n条带仅在您获得至少200点战斗经验的战斗中发放。"
