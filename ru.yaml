"hangar/battleType/trainingDescription": "在任意地图上用任意等级的坦克磨练自己的技术！\n特点：\n• 训练房中的队伍为标准7人制。房间内最高可容纳20名玩家。\n• 在训练战斗中无法获得经验、银币、勋章及其他奖励。\n• 训练中的所有炮弹、补给和消耗品均为免费。\n• 战斗数据不会计入统计。"
