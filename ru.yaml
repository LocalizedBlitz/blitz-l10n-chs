"#crew_skills:lucky_shot/name": "快速射击"
"#crew_skills:lucky_shot/effect": "当误差超过最小值%(highlight_start)%(shotDispersionFactor)%%(highlight_end)时，有%(highlight_start)%(chancePerLevel)%%(highlight_end)几率发动一次精准射击。"
"#crew_skills:lucky_shot/tip": "可以显著提升坦克移动中攻击的命中率。"
"#crew_skills:surrounded_by_enemy/name": "突围"
"#crew_skills:surrounded_by_enemy/effect": "如果您的坦克半径%(highlight_start)%(enemyInRadius)%(highlight_end)内有至少%(highlight_start)%(enemyCount)%(highlight_end)辆敌方坦克，则提高坦克加速度%(highlight_start)%(enginePowerFactorPerLevel)%%(highlight_end)。"
"#crew_skills:surrounded_by_enemy/tip": "是对进攻型坦克最为有效。"
"#crew_skills:soft_recoil/name": "减震"
"#crew_skills:soft_recoil/effect": "进行射击后降低%(highlight_start)%(shotDispersionFactorPerLevel)%%(highlight_end)误差。"
"#crew_skills:soft_recoil/tip": "对自动装弹型坦克最为有效。"
"#crew_skills:battle_rage/name": "狂暴"
"#crew_skills:battle_rage/effect": "击毁一辆敌方坦克后，提高下次攻击的装填速度%(highlight_start)%(reloadFactorPerLevel)%%(highlight_end)。"
"#crew_skills:battle_rage/features": "对自动装填火炮无效。"
"#crew_skills:battle_rage/tip": "对单发伤害高但装填速度慢的坦克最为有效。"
"#crew_skills:armour_piercing/name": "强力穿透"
"#crew_skills:armour_piercing/effect": "有%(highlight_start)%(chancePerLevel)%%(highlight_end)几率提高攻击的护甲穿透。"
"#crew_skills:armour_piercing/features": "技能激活时，穿透深度提升至坦克基础属性的100%–105%。通常，穿透深度范围为基础值的95%–105%。"
"#crew_skills:mountain_climbing/name": "山地训练"
"#crew_skills:mountain_climbing/effect": "降低上坡行驶时的速度损失%(highlight_start)%(level)%%(highlight_end)。"
"#crew_skills:mountain_climbing/tip": "此技能对高机动性的坦克最为有效。"
"#crew_skills:smooth_driving/name": "平稳驾驶"
"#crew_skills:smooth_driving/effect": "降低在移动中的射击误差%(highlight_start)%(shotDispersionFactorPerLevel)%%(highlight_end)。"
"#crew_skills:smooth_driving/tip": "可以显著提升坦克移动中攻击的命中率。"
"#crew_skills:smooth_turret/name": "炮塔平稳转动"
"#crew_skills:smooth_turret/effect": "降低炮塔转动时的射击误差%(highlight_start)%(shotDispersionFactorPerLevel)%%(highlight_end)。"
"#crew_skills:smooth_turret/features": "无炮塔坦克的效果为降低炮管转动时的射击误差。"
"#crew_skills:smooth_turret/tip": "可以显著提升坦克移动中攻击的命中率。"
"#crew_skills:skilled_repairer/name": "可靠保证"
"#crew_skills:skilled_repairer/effect": "降低模块严重受损时的性能损失%(highlight_start)%(penaltyFactorPerLevel)%%(highlight_end)。"
"#crew_skills:close_combat_master/name": "近战大师"
"#crew_skills:close_combat_master/effect": "您的坦克半径%(highlight_start)%(enemyInRadius)%(highlight_end)米内有敌人时，提高炮塔转向速率%(highlight_start)%(turretRotationSpeedFactorPerLevel)%%(highlight_end)。"
"#crew_skills:close_combat_master/tip": "对炮塔转向速率低下的重型坦克最为有效。"
"#crew_skills:fire_fighting/name": "灭火"
"#crew_skills:fire_fighting/effect": "提升灭火速度%(highlight_start)%(healthBurnPerSecLossFactorPerLevel)%%(highlight_end)。"
"#crew_skills:fire_fighting/tip": "对容易起火的坦克最为有效。"
"#crew_skills:desperado/name": "破釜沉舟"
"#crew_skills:desperado/effect": "当坦克生命值低于%(highlight_start)%(vehicleHealthFraction)%%(highlight_end)时，提高装填速度%(highlight_start)%(gunReloadTimeFactorPerLevel)%%(highlight_end)。"
"#crew_skills:desperado/tip": "对高生命值和高护甲的坦克最为有效。"
"#crew_skills:repair/name": "修复"
"#crew_skills:repair/effect": "降低损坏模块的修理时间%(highlight_start)%(repairSpeedFactorPerLevel)%%(highlight_end)。"
"#crew_skills:sniper/name": "神炮手"
"#crew_skills:sniper/effect": "击中敌方坦克时，有%(highlight_start)%(chancePerLevel)%%(highlight_end)几率必定对模块造成伤害。"
"#crew_skills:sniper/features": "当技能激活时，击伤敌方坦克模块的几率提升至 %(highlight_start)%(deviceChanceToHitBoost)%%(highlight_end)。一般情况下，该几率取决于模块类型和距离数值在27%—100%之间。"
"#crew_skills:smooth_turn/name": "平稳转向"
"#crew_skills:smooth_turn/effect": "降低坦克转向时的射击误差%(highlight_start)%(shotDispersionFactorPerLevel)%%(highlight_end)。"
"#crew_skills:sighting/name": "调整火力"
"#crew_skills:sighting/effect": "您的坦克和目标都处于静止状态时，降低第二次攻击的误差%(highlight_start)%(level)%%(highlight_end)。"
"#crew_skills:sighting/features": "该技能在准星离开目标、目标或您的坦克移动超过5米后将失效。"
"#crew_skills:sighting/tip": "此技能对经常埋伏狙击敌人的坦克最为有效。"
"#crew_skills:deadly_accuracy/name": "绝命反击"
"#crew_skills:deadly_accuracy/effect": "当队友全部阵亡时，提高视野范围和瞄准速度%(highlight_start)%(aimingFactorPerLevel)%%(highlight_end)。"
"#crew_skills:camouflage/name": "涂装"
"#crew_skills:camouflage/effect": "提高坦克隐蔽性%(highlight_start)%(camouflageFactorPerLevel)%%(highlight_end)。"
"#crew_skills:camouflage/tip": "对小型低车身的坦克最为有效。"
"#crew_skills:virtuoso/name": "快速转弯"
"#crew_skills:virtuoso/effect": "提升坦克转向速率%(highlight_start)%(rotationSpeedFactorPerLevel)%%(highlight_end)。"
"#crew_skills:tutor/name": "老兵"
"#crew_skills:tutor/effect": "提高乘员经验获取量%(highlight_start)%(xpBonusFactorPerLevel)%%(highlight_end)。"
"#crew_skills:fast_capture/name": "快速占领"
"#crew_skills:fast_capture/effect": "提高基地占领速度%(highlight_start)%(captureSpeedFactorPerLevel)%%(highlight_end)。"
"#crew_skills:fast_capture/features": "在一名具有此技能的队友身边占领基地时占领速度额外增加%(highlight_start)10%%(highlight_end)。"
"#crew_skills:skilled_ranging/name": "精密射击"
"#crew_skills:skilled_ranging/effect": "连续%(highlight_start)3%(highlight_end)次射击并造成伤害时，每次射击有%(highlight_start)%(activationChancePerLevel)%%(highlight_end)几率使下次攻击造成最大伤害。"
"#crew_skills:skilled_ranging/features": "射击发生未命中或未造成伤害会中断连续纪录。"
"#crew_skills:skilled_ranging/tip": "只在确定能造成伤害时射击。"
