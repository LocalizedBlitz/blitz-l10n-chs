"#GunMarksOverlay:Description": "什么是炮管标记：\n• 炮管标记是显示在坦克炮管上的视觉标记，用于展示您对这辆坦克的精通等级。\n• 无论是否安装涂装或挂件，车库和所有战斗模式中始终都会显示这些标记。\n• 每辆坦克最多可拥有三个炮管标记。一旦获得，标记不会被降级或移除。\n\n如何获得炮管标记：\n• 炮管标记从%(tier)级坦克起开放。对于新坦克，炮管标记通常在坦克加入标准模式约14天内开放。\n• 您统计数据中的标准模式、排位战，或两者之和需达到至少%(minLastBattles)场时，才有资格获得炮管标记。\n• 标记的发放会基于您使用该坦克最近约50场战斗所计算出的“平均炮管标记经验”来评定。\n• \"炮管标记经验\"是一种战斗效能指标：仅计算无加成的经验，不含团队伤害加成与胜利加成。您在战斗中的所有积极行为都将计入——包括造成伤害、协助、侦察、击毁、占领基地等。\n• 仅标准模式计入您的进度。其他模式及小队战斗既不纳入统计，也不会中断您的进度。\n• 炮管标记阈值：“平均炮管标记经验”排名前35%的玩家可获得1个标记；前15%获得2个；前5%获得3个。我们每日收集并更新“平均炮管标记经验”，因此您的排名会随整体统计数据波动。\n• 系统统计您最近的50场战斗。若您的“平均炮管标记经验”达到其他玩家近50场的平均值，也可能未满50场提前获得标记。"
"profile/Brief/WinRatePopup/Description": "显示近30天、90天和365天内的标准模式场次及胜率。"
