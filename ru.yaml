"hangar/battleType/scuffleDescription": "在接近真实的条件下，无需常规提示，检验您的技巧！\n特点：\n• 炮弹的穿透力和伤害没有浮动值，始终等于平均值。\n• 敌方坦克无轮廓高亮，狙击模式下装甲无高亮。\n• 敌方坦克的血条、标记和图标不显示，但仍可通过快速指令标记敌方战车。\n• 敌方坦克在小地图上不显示，但只要未被障碍物遮挡，任何距离下皆可见。\n• 使用指挥官视角替代第三人称视角：视野位于坦克车体正上方。\n• 地图上的所有植被变为不透明。\n• 当您的坦克被敌方发现时，灯泡不会亮起。\n• 战斗在特定地图上展开，仅限历史坦克。\n• 战斗前，战车将移除挂件并安装真实涂装。\n• 战斗按争霸战规则进行，不计入统计数据。"
