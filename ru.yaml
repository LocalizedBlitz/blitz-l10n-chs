"TankCounter/UniversalDamage/Title": "“伤害”计数器"
"TankCounter/UniversalDamage/Description": "%(highlight_start)计数器如何工作？%(highlight_end)<br/>• 每造成相当于坦克50%最大生命值的伤害，进度+1。"
"TankCounter/UniversalDamage/Example": "%(highlight_start)示例%(highlight_end)<br/>• 如果您的坦克最大生命值为1000点，则每造成500点伤害，进度+1。"
"TankCounter/UniversalKills/Title": "计数器“击毁”"
"TankCounter/UniversalKills/Description": "%(highlight_start)计数器如何工作？%(highlight_end)<br/>• 每击毁一名敌人，进度+1"
"TankCounter/UniversalKills/Example": "%(highlight_start)示例%(highlight_end)<br/>• 击毁3名敌人，你获得+3进度"
"TankCounter/CloseHitSeries/Title": "计数器“近距离连击”"
"TankCounter/CloseHitSeries/Description": "%(highlight_start)计数器如何工作？%(highlight_end)<br/>• 从第二次连续造成伤害的射击开始，每发射一次弹药，进度+1<br/><br/>%(highlight_start)特点%(highlight_end)<br/>• 未击穿、跳弹、命中但未造成伤害、未命中均会中断连击<br/>• 在距离超过150米的位置造成伤害的射击不会中断连击，但也不会计入进度"
"TankCounter/CloseHitSeries/Example": "%(highlight_start)示例%(highlight_end)<br/>• 在120米距离造成伤害的射击——造成伤害的连击长度：1<br/>• 在125米距离跳弹——连击中段<br/>• 在100米距离造成伤害的射击——连击长度：1<br/>• 在175米距离造成伤害的射击——连击长度：1<br/>• 在80米距离造成伤害的射击——连击长度：2<br/>• 你获得+1进度"
"TankCounter/Drummer/Title": "计数器“弹鼓大师”"
"TankCounter/Drummer/Description": "%(highlight_start)计数器如何工作？%(highlight_end)<br/>• 如果弹鼓内的所有炮弹都造成了伤害，则进度+2<br/>• 如果弹鼓内超过一半的炮弹造成了伤害，则进度+1<br/><br/>%(highlight_start)特点%(highlight_end)<br/>• 重新装填弹鼓会中断连击"
"TankCounter/Drummer/Example": "%(highlight_start)示例%(highlight_end)<br/>• 你的坦克弹鼓内有3发炮弹，你依次射击<br/>• 第1发造成伤害<br/>• 第2发未造成伤害<br/>• 第3发造成伤害<br/>• 弹鼓打空，3发中有2发造成了伤害<br/>• 你获得+1进度"
"TankCounter/Assist/Title": "计数器“协助击毁”"
"TankCounter/Assist/Description": "%(highlight_start)计数器如何运作？%(highlight_end)<br/>• 每当你对一名敌方坦克造成超过其生命值50%的伤害，且该坦克最终被击毁，则进度+1。<br/><br/>%(highlight_start)特色%(highlight_end)<br/>• 无论由谁最终击毁该坦克，都会计数"
"TankCounter/Assist/Example": "%(highlight_start)示例%(highlight_end)<br/>• 敌方坦克的最大生命值为 1000 点。<br/>• 如果在该坦克被击毁前，你对其造成了 501 点伤害，则进度+1"
"TankCounter/CloseHitAndArmor/Title": "计数器“近距离伤害与装甲”"
"TankCounter/CloseHitAndArmor/Description": "%(highlight_start)计数器如何运作？%(highlight_end)<br/>• 每当你造成的伤害与被抵挡的伤害之和，达到你的坦克最大生命值的50%，则进度+1。<br/><br/>%(highlight_start)特色%(highlight_end)<br/>• 仅统计你在 150 米以内造成的伤害"
"TankCounter/CloseHitAndArmor/Example": "%(highlight_start)示例%(highlight_end)<br/>• 你的坦克最大生命值为 1000 点。<br/>• 你造成了 400 点伤害，并抵挡了 100 点伤害。<br/>• 造成的伤害与被抵挡的伤害之和为 500 点。<br/>• 进度+1"
"TankCounter/Armor/Title": "计数器“装甲”"
"TankCounter/Armor/Description": "%(highlight_start)计数器如何运作？%(highlight_end)<br/>• 每当你抵挡的伤害达到你的坦克最大生命值的20%，则进度+1"
"TankCounter/Armor/Example": "%(highlight_start)示例%(highlight_end)<br/>• 如果你的坦克最大生命值为 1000 点，则每抵挡 200 点伤害，进度+1"
"TankCounter/Activity/Title": "计数器“火力支援”"
"TankCounter/Activity/Description": "%(highlight_start)计数器如何运作？%(highlight_end)<br/>• 每当你对一名敌方坦克造成超过其生命值20%的伤害，且该坦克最终被击毁，则进度+1。<br/><br/>%(highlight_start)特色%(highlight_end)<br/>• 无论由谁最终击毁该坦克，都会计数"
"TankCounter/Activity/Example": "%(highlight_start)示例%(highlight_end)<br/>• 敌方坦克的最大生命值为 1000 点<br/>• 如果在该坦克被击毁时你对其造成了 201 点伤害，则你的进度将增加 +1"
"TankCounter/FarHitSeries/Title": "远程射击系列计数器"
"TankCounter/FarHitSeries/Description": "%(highlight_start)计数器如何运作？%(highlight_end)<br/>• 连续第2次及后续造成伤害的射击，每次为进度增加 +1 或 +2<br/><br/>%(highlight_start)特点%(highlight_end)<br/>• 进度取决于距离：50米以内 — 0（但不中断连击），50至150米 — +1，150米以上 — +2<br/>• 未击穿、跳弹、命中但未造成伤害、未命中均会中断连击"
"TankCounter/FarHitSeries/Example": "%(highlight_start)示例%(highlight_end)<br/>• 从155米处射击并造成伤害 — 造成伤害的连击长度：1<br/>• 从157米处射击并造成伤害 — 连击长度：2<br/>• 你获得 +2 进度"
"TankCounter/SafeHitSeries/Title": "安全射击系列计数器"
"TankCounter/SafeHitSeries/Description": "%(highlight_start)计数器如何运作？%(highlight_end)<br/>• 连续第2次及后续造成伤害的射击，每次为进度增加 +1<br/><br/>%(highlight_start)特点%(highlight_end)<br/>• 未击穿、跳弹、命中但未造成伤害、未命中以及你的坦克受到伤害，均会中断连击"
"TankCounter/SafeHitSeries/Example": "%(highlight_start)示例%(highlight_end)<br/>• 一次造成伤害的射击 — 造成伤害的连击长度：1<br/>• 另一次造成伤害的射击 — 连击长度：2<br/>• 你获得 +1 进度<br/>• 再一次造成伤害的射击 — 连击长度：3<br/>• 你再次获得 +1 进度<br/>• 你的坦克受到伤害，连击中段"
"TankCounter/FarSafeHitSeries/Title": "远程安全射击系列计数器"
"TankCounter/FarSafeHitSeries/Description": "%(highlight_start)计数器如何运作？%(highlight_end)<br/>• 连续第2次及后续造成伤害的射击，每次为进度增加 +1 或 +2<br/><br/>%(highlight_start)特点%(highlight_end)<br/>• 进度取决于距离：50米以内 — 0（但不中断连击），50至150米 — +1，150米以上 — +2<br/>• 未击穿、跳弹、命中但未造成伤害、未命中以及你的坦克受到伤害，均会中断连击"
"TankCounter/FarSafeHitSeries/Example": "%(highlight_start)示例%(highlight_end)<br/>• 从155米处射击并造成伤害 — 连击长度：1<br/>• 从157米处射击并造成伤害 — 连击长度：2<br/>• 你获得 +2 进度<br/>• 如果此后你的坦克受到伤害，连击中段"
"TankCounter/DamageAndArmor/Title": "“伤害和装甲”计数器"
"TankCounter/DamageAndArmor/Description": "%(highlight_start)计数器如何工作？%(highlight_end)<br/>• 造成和抵挡的伤害之和达到我方坦克最大生命值的50%，则计数+1"
"TankCounter/DamageAndArmor/Example": "%(highlight_start)示例%(highlight_end)<br/>• 我方坦克最大生命值为1000点。<br/>• 你造成400点伤害并抵挡100点伤害<br/>• 造成和抵挡的伤害之和为500点。<br/>• 计数+1"
