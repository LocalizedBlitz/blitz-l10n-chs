"#mechanics:title": "机制"
"TankMechanics/TTHOnMaps": "神秘突变"
"TankMechanics/TTHOnMapsDescription": "根据不同地图类型提升坦克性能。\n在沙漠地图上，坦克速度和机动性更高；在冬季地图上，坦克更加耐打；在夏季地图上，坦克将获得令人印象深刻火力。"
"TankMechanics/ArmorMoving": "硬化装甲"
"TankMechanics/ArmorMovingDescription": "• 按下按钮时，盾牌会移动到坦克车体前部，增加其装甲厚度并保护其免受穿透。\n• 当盾牌前移时，坦克部分性能会降低。\n• 再次按下按钮可取下盾牌，坦克性能会恢复。"
"TankMechanics/ChRocketBoosters": "火箭助推器"
"TankMechanics/ChRocketBoostersDescription": "• 激活该机制后，坦克的推重比和前进最高速度会提升\n• 拥有火箭助推器机制的坦克对敌人造成的撞击伤害增加，自身受到的撞击伤害减少\n• 火箭助推器开启时，坦克的转向速度和倒车最高速度会降低"
"#battle:Message/Consumables/rocketBooster_in_use": "火箭助推器已在使用中"
"#battle:Message/Consumables/rocketBooster_in_cooldown": "火箭助推器冷却中"
"TankMechanics/DrumShot": "弹鼓式火炮"
"TankMechanics/DrumShotDescription": "• 弹匣中根据火炮类型装有数发炮弹\n• 坦克以短间隔依次发射炮弹，最后一发炮弹发射后，弹鼓开始装填"
"TankMechanics/ArmorPumpShot": "可补弹的弹鼓式火炮"
"TankMechanics/PumpShotDescription": "• 弹鼓在每发射一发炮弹后都会进行补弹\n• 如果发射第一发炮弹后不立即发射下一发，第一发炮弹会开始自动装填\n• 如果在第一发炮弹装填过程中发射第二发炮弹，则装填会中断\n• 当坦克发射完所有炮弹后，弹鼓会逐发进行装填"
"TankMechanics/GunSwitcher": "切换射击模式"
"TankMechanics/GunSwitcherDescription": "• 坦克拥有两种射击模式，可通过点击按钮进行切换。\n• 第一种模式以1秒的间隔依次发射单发炮弹，第二种模式则进行齐射。\n• 如果在两种模式之间切换时弹匣中仍有炮弹，您可以选择发射所有剩余炮弹，或让火炮完全重新装填。"
"#battle:Message/Consumables/gunSwitcher_in_use": "射击模式切换机制正在使用中"
"#battle:Message/Consumables/gunSwitcher_in_cooldown": "射击模式切换机制正在冷却"
"cant_shoot_gun_disabled": "不能攻击：火炮被锁定"
"TankMechanics/GunCooling": "火炮冷却"
"TankMechanics/GunCoolingDescription": "• 装填完成后稍等片刻，可提高下一发炮弹的伤害并加快之后的装填速度。\n• 火炮冷却进度显示在瞄准镜两侧的特殊进度条上。\n• 要获得最大加成，需要等待火炮完全冷却。"
"TankMechanics/TwinGuns": "双联装火炮"
"TankMechanics/TwinGunsDescription": "• 火炮有两种射击模式（单发和齐射），可通过按钮切换。\n• 单发模式下，火炮交替射击，装填相互独立。\n• 要使用齐射，两门火炮都必须完成装填。\n• 瞄准镜上的标记与每门火炮相关联，根据距离改变位置。"
"cant_shoot_all_guns_reload": "火炮正在装填…"
"cant_shoot_all_guns_disabled": "不能攻击：火炮被锁定"
"all_guns_destroyed": "不能攻击：火炮被击毁"
