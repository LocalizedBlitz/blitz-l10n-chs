"HOLLOW_CHARGE_DESCRIPTION": "拥有高额的穿透力，并且穿透参数不受距离的影响。命中坦克装甲板和履带时穿透力会显著降低。不会发生跳弹。"
"HIGH_EXPLOSIVE_DESCRIPTION": "穿透力较低，但如果能穿透装甲能造成高额的伤害。当命中障碍物时，炮弹会爆炸并造成少量溅射伤害。口径超过152毫米的火炮使用它最为有效。不会发生跳弹。"
"ARMOR_PIERCING_DESCRIPTION": "拥有中等的穿透力和伤害。是大部分火炮的标准型炮弹。可能发生跳弹。"
"ARMOR_PIERCING_HE_DESCRIPTION": "相比于高爆弹拥有高额的伤害和更强的穿透力。命中障碍物时，炮弹会爆炸并造成少量溅射伤害。不会跳弹。"
"ARMOR_PIERCING_CR_DESCRIPTION": "拥有高额的穿透力和速度。对抗重装甲坦克最为有效。远距离以呈一定角度命中装甲会显著降低穿透力。可能发生跳弹。"
