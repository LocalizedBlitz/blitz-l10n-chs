"#settings:Personalized/Dialogs/DisableContent/Description": "关闭后，我们不会根据您的偏好向您推送内容，您看到的内容将与您的相关性降低，且可能是您不感兴趣的内容。"
"#settings:Personalized/Dialogs/Details/Title": "个性化内容推荐"
"#settings:Personalized/Dialogs/Details/Description": "为向您提供便捷高效的道具及商品兑换服务，我们会基于您的必要信息利用计算机算法程序向您推荐您更感兴趣的道具或商品。\n\n我们会基于您的设备信息（IMEI、IDFA、设备型号、系统版本）、日志信息（游戏登入登出记录、玩法参与记录、道具点击/购买/使用记录、充值记录、社交互动记录、搜索的字词）、性别、年龄、设备位置信息，通过计算机算法程序自动分析前述一项或多项信息后类型化提取您的用户特征画像，智能预测您的偏好特征，据此匹配您可能感兴趣的内容。请您知悉，前述推荐算法并不会将前述数据与您的真实身份信息进行匹配，因此我们不会基于此目的识别你的真实身份。\n\n如您不希望接收个性化推荐服务，您可以关闭推荐功能，设置路径为“设置-个性化服务-个性化内容推荐”。关闭后，我们将不会使用您的相关信息向您推荐内容，展示内容与您的偏好相关度降低，可能会影响您的用户体验。"
"#settings:Personalized/Dialogs/DisableContentTag/Title": "标签确认删除"
"#settings:Personalized/Dialogs/DisableContentTag/Description": "删除该项标签，我们将不会基于您的该项特征向您提供个性化内容，您所看到的相关内容或搜索结果将与您的相关性降低，可能影响您获取内容的便捷性。"
