"hangar/battleType/totalGameModeHeader": "全面统治"
"hangar/battleType/totalGameModeShortDescription": "I–X级坦克齐聚一堂。运用团队策略与机动性，争夺快速变化的基地！"
"battleType/total_game_mode": "全面统治"
"hangar/battleType/total_game_modeDescription": "获胜条件：率先获得1,000胜利点数，或在时间结束时拥有比敌方队伍更多的胜利点数。重生次数无限。\n您可以使用任何等级的坦克加入此战斗模式。所有坦克将根据各类型X级坦克的平均属性进行平衡。匹配系统会像以往一样对每支队伍的坦克类型进行平衡分配。\n战斗时长为7分钟，不影响您的统计数据。\n\n占领随机基地：\n• 占领并保卫地图上激活的基地，以获取胜利点数。占领每个基地都需要快速行动。\n• 激活的基地会在地图上随机依次出现。\n• 在下一个基地激活前，小地图上会先出现一个锁形图标指示其位置。锁形图标消失后方可开始占领。\n• 新激活的基地从尚未激活过的基地中随机选取。如果地图上所有基地均已激活一次，则开始新一轮循环。\n• 密切关注小地图，以便快速应对变化。请记住，第一个激活的基地出现在地图中央。\n\n击退敌人：\n• 通过伤害基地圈内的敌方坦克，来阻止敌方队伍占领已激活的基地。\n• 重新占领之前被敌方队伍占领的激活基地，阻止他们获得胜利点数。\n• 摧毁敌方坦克以减少敌方队伍的胜利点数。\n\n额外机制：\n• 如果己方队伍的胜利点数显著落后于敌方，己方坦克的重生速度将加快。"
"#arenas:type/totalGameMode/description": "目标：占领基地，成为率先获得1,000胜利点数的队伍。"
