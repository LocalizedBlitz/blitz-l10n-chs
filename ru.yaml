"#achievements:armorPiercer_condition": "• 连续纪录会被未命中，未击穿，或跳弹打断。\n• 使用同一辆坦克参加下场战斗以继续计算连续纪录。\n• 每辆坦克战绩单独统计，仅记录最高分数。"
