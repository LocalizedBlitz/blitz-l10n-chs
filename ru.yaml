"consumables/splash/Name": "地狱"
"consumables/splash/Descr": "当向物体射击时，炮弹爆炸并对25米内的所有敌人造成伤害。\n伤害值为您当前坦克生命值的%(healthFactor)。\n"
"#artefacts:curse/name": "血痕"
"#artefacts:curse/descr": "瞄准敌方坦克并激活能力。10秒内，敌方坦克移动将损失生命值。\n\n每移动10米损失最大生命值的10%。\n\n此为预装能力且不能出售或更改。所有其他能力仅战斗中可获取。\n"
"consumables/returnInTime/Name": "时间跃迁"
"consumables/returnInTime/Descr": "激活后，时间跃迁将使您的坦克回到4秒前的位置、状态、和血量。\n坦克被击毁后时间跃迁不生效。\n\n此为预装能力且不能出售或更改。所有其他能力仅战斗中可获取。\n"
"#artefacts:pretendDead/name": "假死"
"#artefacts:pretendDead/descr": "激活时，假死使你的坦克看起来像被击毁了一样。效果在移动、射击、转动炮塔时仍持续。被击中、撞击、和坠落会导致假死效果结束。假死会为您的坦克抵挡一次炮弹或技能的伤害。\n\n此为预装能力，不能出售或更改。所有其他能力仅战斗中可获取。\n"
"#artefacts:moonwalk_hellgames/name": "阴影"
"#artefacts:moonwalk_hellgames/descr": "激活时，阴影使您的坦克对敌人隐形并提升速度，发起攻击或受到伤害时失效。\n\n%(enginePowerFactor)引擎动力。\n+30 千米/时最高速度。\n\n此为预装能力且不能出售或更改。所有其他能力仅战斗中可获取。\n"
"provisions/reloadBoost/Name": "快速射击 I"
"provisions/reloadBoost/Description": "%(gun__reloadTime)火炮装填时间。"
"provisions/reloadBoostImproved/Name": "快速射击 II"
"provisions/reloadBoostImproved/Description": "%(gun__reloadTime)火炮装填时间。"
"provisions/enemyReloadTime/Name": "第六感"
"provisions/enemyReloadTime/Description": "允许您看见敌方坦克的装填进度条。"
"provisions/damageBoost/Name": "锯齿弹 I"
"provisions/damageBoost/Description": "%(commonDamageFactor)一次射击伤害。"
"provisions/damageBoostImproved/Name": "锯齿弹 II"
"provisions/damageBoostImproved/Description": "%(commonDamageFactor)一次射击伤害。"
"provisions/engineBoost/Name": "超能力 I"
"provisions/engineBoost/Description": "%(engine__power)引擎动力。\n最高时速+10公里/小时。"
"provisions/engineBoostImproved/Name": "超能力 II"
"provisions/engineBoostImproved/Description": "%(engine__power)引擎动力。\n最高时速+20公里/小时。"
"provisions/comeBackKit/Name": "一息尚存"
"provisions/comeBackKit/Description": "受到致命伤害时，您的坦克不会被摧毁而是保留1点生命值。弹药架爆炸不会生效。"
"provisions/ghost/Name": "幽灵"
"provisions/ghost/Description": "灯泡图标立即出现。当离开侦查范围时，您的坦克将变为不可见。"
"provisions/ramming/Name": "狼击 I"
"provisions/ramming/Description": "%(dealingRammingDamageFactor)对敌方坦克的撞击伤害。\n%(rammingDamageFactor)受到敌方坦克撞击的伤害。"
"provisions/rammingImproved/Name": "狼击 II"
"provisions/rammingImproved/Description": "%(dealingRammingDamageFactor)对敌方坦克的撞击伤害。\n%(rammingDamageFactor)受到敌方坦克撞击的伤害。"
"#artefacts:hunters_mark_hellgames/name": "猎人标记"
"#artefacts:hunters_mark_hellgames/descr": "激活猎人面具时，使所有友军对你所瞄准的敌方坦克造成更多伤害。\n\n所有友军伤害增加%(damageFactor)。\n玩家启用猎人面具能力时在小地图上可见。\n如果敌方坦克从小地图上消失，猎人面具效果将随之结束。\n对一辆坦克同时只能有一个猎人面具生效。\n\n此为预装能力且不能出售或更改。所有其他能力仅战斗中可获取。\n"
"#respawn/awaitReturnToBattleText": "返回战斗于"
"#respawn/AbilityPanel/AvailableAmmunition": "选择能力"
"#artefacts:berserk_hellgames/name": "战斗狂热"
"#artefacts:berserk_hellgames/descr": "+50%对敌人的伤害且+40%承受的伤害。\n-50%散布误差。\n-30%装填时间。"
"#artefacts:reflectionAbility/name": "伤害反弹"
"#artefacts:reflectionAbility/descr": "敌人对您造成伤害时自身承受40%反弹伤害。\n如果射击未造成伤害，则反弹敌人平均伤害的40%。"
"#artefacts:revengeAbility/name": "剧毒凝视"
"#artefacts:revengeAbility/descr": "+30%首次命中已通过射击伤害过您的对手所造成的伤害。\n该改装效果在造成伤害后立即停止，并在承受无伤害命中时也会停止。\n持续时间：10秒。"
