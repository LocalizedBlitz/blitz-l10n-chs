"TankMechanics/MovableArmorDescription": "移动装甲覆盖车体和炮塔弱点，%(highlight_start)提供额外防护%(highlight_end)。\n对于Titan H-Nd，%(highlight_start)血量降至50%时激活%(highlight_end)。\n对于Titan-54d，使用动力装甲系统时激活。"
"TankMechanics/ImprovedDetection": "曳光弹"
"TankMechanics/ImprovedDetectionDescription": "• %(highlight_start)使敌方坦克对所有队友可见20秒%(highlight_end)（标准时间为10秒）。\n• 在穿透、未穿透和跳弹时均可激活。\n• 盲射命中或高爆弹在坦克旁爆炸的溅射伤害不会激活。"
"TankMechanics/InternalTrack": "应急履带"
"TankMechanics/InternalTrackDescription": "允许坦克在主履带被摧毁时向后行驶。"
"TankMechanics/DesertPower": "沙漠之力"
"TankMechanics/DesertPowerDescription": "• %(highlight_start)+50%%(highlight_end)模块修复速度。\n• 在%(highlight_start)沙漠地图上%(highlight_end)生效：沙漠、黑色矿脉、砂丘、不毛之地、PEPT和极端竞技场。"
"TankMechanics/ReserveAmmo": "备用炮弹"
"TankMechanics/ReserveAmmoDescription": "• 弹匣中的炮弹在射击间隙进行装填，提供更快的射击节奏。\n• 其中一发炮弹（在弹匣队列中的位置取决于具体战车）的装填时间比其他炮弹更长。"
"TankMechanics/ReducedSpotDuration": "适应性隐蔽"
"TankMechanics/ReducedSpotDurationDescription": "• 脱离敌方侦察范围后，%(highlight_start)您的坦克会比其他战车提早数秒隐形。%(highlight_end)\n• 被曳光弹命中后，坦克脱离点亮的速度会稍微加快。\n• 当您被对手发现时，%(highlight_start)对方头顶会出现红眼图标%(highlight_end)。"
"TankMechanics/ShotDispersionStabilizator": "战斗稳定装置"
"TankMechanics/ShotDispersionStabilizatorDescription": "低速行驶时，瞄准圈扩散最小化，能够更准确地瞄准。"
"TankMechanics/DraculaTrack": "履带再生装置"
"TankMechanics/DraculaTrackDescription": "被摧毁的履带修复速度翻倍。"
"TankMechanics/WithoutCrew": "幽灵乘员"
"TankMechanics/WithoutCrewDescription": "您无法伤害不存在的乘员，因为弗兰肯斯坦坦克根本没有乘员。\n• 但您仍然可以提升技能和熟练度。技能加成和其他坦克一样。"
"TankMechanics/LTCamo": "隐蔽移动"
"TankMechanics/LTCamoDescription": "移动时不会降低隐蔽性。射击时无效。"
"TankMechanics/DoubleShot": "双重射击"
"TankMechanics/DoubleShotDescription": "一次性射出两发炮弹的快速射击。"
"TankMechanics/TripleShot": "三重射击"
"TankMechanics/TripleShotDescription": "一次性射出三发炮弹的快速射击。"
"TankMechanics/NotDamageModuls": "狼人防御"
"TankMechanics/NotDamageModulsDescription": "内部模块和火炮不会重伤。\n• 在大首领模式中，首领的射击可能引发起火和弹药架爆炸。"
"TankMechanics/ATGM": "反坦克导弹"
"TankMechanics/ATGMDescription": "• 您可以通过移动镜头或准心来控制射出的炮弹。\n• 坦克只能在娱乐模式中使用（突击战和真实战役除外）。"
"TankMechanics/TrayShell": "突击弹"
