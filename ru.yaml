"battleType/Lunar": "重力"
"hangar/battleType/LunarDescription": "在低重力环境下战斗——您可以在战场上空翱翔，或将敌人击飞穿越整个地图！\n特点：\n• 即使在飞行中也能控制坦克。\n• 坦克受到的坠落伤害降低，移动速度更快。\n• 命中敌方坦克时，炮弹不仅造成伤害，还会将其击退。\n• 开火后的后坐力大幅增强。坦克越轻，火炮口径越大，后坐力对车体的影响也越大。\n• 所有中型、轻型坦克和坦克歼击车都拥有“火箭助推器”能力，可向行进方向跳跃。\n• 战斗采用争霸战或遭遇战规则，不会计入统计数据。"
"#artefacts:ally_buff/descr": "如果在60米范围内有存活队友，每名队友都将使您的坦克获得以下增益：\n• +25%装填速度；\n• +30%瞄准速度；\n• +35%观察范围。<br/><br/>最多3名存活队友提供最大增益。<br/><br/>战斗中自动生效。<br/>整场战斗持续生效。<br/>"
"hangar/battleType/bossmodeDescription": "体验赋予坦克超凡能力的独特技术！\n特点：\n• 战斗中有5种角色：修复者、轰炸者、毒害者、引力者，以及最重要的角色——首领。角色在战斗开始前随机分配给玩家。\n• 每支队伍只能有一位首领，该角色将在整场战斗中固定。首领坦克的属性会大幅提升。\n• 每辆坦克根据其角色获得独特能力。\n• 除首领外，所有角色均可从I级提升至V级。等级越高，坦克属性和能力越强。所有角色的等级会同时提升，且能力的冷却时间会重置。\n• 首领在战斗中有3条生命，其他玩家可无限次重生。此外，所有非首领玩家被摧毁后将获得一个新的随机角色，并保留已提升的等级。\n• 目标：通过摧毁敌方坦克将敌方点数降至0，同时阻止敌方削减您的队伍点数。队伍中每有一名玩家被摧毁，队伍失去1点；如果首领被摧毁，则失去5点。\n• 战斗持续9分钟，不会计入统计数据，也不授予成就勋章。"
"#battle_results:Reason_MaxScore_Win_for_BossMode": "友军击落了敌方所有点数"
"#battle_results:Reason_BiggerScore_Win_for_BossMode": "战斗结束时友军剩余点数更多"
"#battle_results:Reason_MaxScore_Lose_for_BossMode": "敌军击落了友军所有点数"
"#battle_results:Reason_BiggerScore_Lose_for_BossMode": "战斗结束时敌军剩余点数更多"
"#artefacts:railgunCharger/descr": "对路径上的所有敌人造成伤害。不适用于反坦克导弹。"
"hangar/battleType/tentotenHeader": "大混战"
"battleType/tentoten": "大混战"
"hangar/battleType/tenToTenShortDescription": "玩家越多，战斗越刺激！"
"hangar/battleType/tentotenDescription": "大家熟悉的普通战斗模式，但人数更多。\n特点：\n• 每队10名玩家，随机匹配。\n• 可以两人或三人组队。\n• 战斗采用 supremacy 或 encounter 模式规则，持续7分钟，不计入统计数据。"
"battleType/battle-royale": "角斗士"
"hangar/battleType/battleRoyaleHeader": "角斗士"
"hangar/battleType/battle-royaleDescription": "体验角斗士的感觉，在残酷的竞技场上努力成为最后的幸存者！\n特点：\n• 12名玩家各自为战。目标是成为战斗中唯一的幸存者。\n• 战斗过程中，游戏区域会逐渐缩小。\n• 待在安全区内——这样你才有更大的生存机会。如果区域变为黄色，请在60秒内离开。超过这个时间，区域会变为红色并开始对你的坦克造成持续伤害。\n• 战斗中有10个坦克升级等级。要提升等级，请造成伤害、摧毁敌方坦克并拾取补给。从1级（战斗开始时）起，每升一级，从两个增益中选择一个来提升坦克属性。\n• 所有坦克在战斗期间均可使用“再生”能力——恢复坦克生命值。拾取补给来为其充能。\n• 战斗中有多种补给，可提高你的生存几率：物资、补给和战利品。\n• 物资预先放置在地图上的随机位置，并以绿色或黄色光束标记。拾取绿色物资可提升坦克生存能力，黄色物资可提升乘员技能。\n• 补给是稀有且最有价值的奖励，以蓝色光束和小地图图标标记。可提升生命值和乘员技能，修复受损模块和乘员，装填消耗品，最快速度为再生充能，并提升升级等级。\n• 战利品会留在被摧毁的敌人位置，以红色光束标记。拾取后可获得额外弹药、提升单发伤害并为火炮装填。\n• 战斗在所有坦克等级相同的大型特殊地图上进行，持续8分30秒，不计入统计数据。"
