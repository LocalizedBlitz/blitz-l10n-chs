"#lobby:MainScreen/Abilities/Title": "能力"
"#artefacts:moonwalk/name": "变色龙伪装"
"#artefacts:moonwalk/descr": "• 坦克在战斗中和小地图上对敌方不可见，\n• 引擎功率提升4倍。\n• 最高速度提升30%。<br/><br/>坦克起火或受到伤害时改装会提前失效。<br/><br/>"
"#artefacts:afterburner_ability/name": "高辛烷值燃料"
"#artefacts:afterburner_ability/descr": "• 提升发动机功率3倍。\n• 提升最高速度2倍。\n• 提升履带耐久度10倍。"
"#artefacts:shield/name": "铀盾"
"#artefacts:shield/descr": "• 受到的射击或撞击伤害减少50%。\n• 若伤害超过坦克最大生命值的5%，护盾将自动激活。<br/><br/>在战斗中自动生效。<br/>效果将持续整场战斗。<br/><br/>"
"#artefacts:sacrifice/name": "半衰期释放"
"#artefacts:sacrifice/descr": "• 激活时对坦克造成最大生命值8%的伤害。\n• 将您对敌人造成的所有类型伤害提升40%。<br/><br/>若坦克剩余生命值低于改装所需的激活条件，则无法使用该效果。<br/><br/>"
"#artefacts:dash/name": "加速器"
"#artefacts:dash/descr": "坦克沿运动方向冲刺30米。\n发动机或履带严重损坏时无法使用。\n如果在装填期间摧毁敌人，该改装会立即装填并再次可用。"
"#artefacts:stealth/name": "破坏者系统"
"#artefacts:stealth/descr": "如果您的坦克被发现，灯泡会立即亮起。<br/><br/>如果您的坦克在侦察范围之外，将立即变为不可见并消失在小地图上。<br/><br/>在战斗中自动生效。<br/>效果将持续整场战斗。<br/>"
"#artefacts:ally_buff/name": "战斗协调器"
"#artefacts:ramming_damage/name": "重型冲撞器"
"#artefacts:ramming_damage/descr": "提升对敌方坦克的撞击伤害。降低自身受到的撞击伤害。\n+45%敌方坦克的撞击伤害。\n-50%自身受到的撞击伤害。\n自动激活。效果持续整场战斗。"
"#artefacts:lifesteal_heal/name": "装甲再生器"
"#artefacts:lifesteal_heal/descr": "• 对敌方造成伤害时，恢复己方坦克相当于伤害值15%的生命值。\n• 撞击或对友军造成伤害时，为其恢复相当于潜在撞击伤害或您炮弹标准伤害75%的生命值。\n• 击毁敌方坦克时，恢复己方坦克相当于最大生命值10%的生命值。<br/><br/>在战斗中自动生效。<br/>效果将持续整场战斗。<br/>"
"#artefacts:lifesteal_heal_vampiric/name": "装甲再生器"
"#artefacts:lifesteal_heal_vampiric/descr": "• 对敌人造成伤害时，恢复自身坦克相当于伤害量40%-50%的生命值。\n• 撞击或对友军造成伤害时，友军恢复相当于潜在撞击伤害或自身炮弹平均伤害50%-60%的生命值。\n• 击毁敌方坦克时，恢复相当于自身坦克最大生命值10%的生命值。<br/><br/>在战斗中自动生效。<br/>效果将持续整场战斗。<br/>"
"madGamesEvent/tierFive/vehicleInfo/header": "赢得Scavenger！"
"madGamesEvent/tierFive/vehicleInfo/description": "Scavenger是废土上最流行的坦克。它优秀的牵引力和强劲的引擎可以让你快速改变位置以躲避敌方火力。Scavenger有两种火炮可供选择：75毫米火炮可以将远处的敌方坦克变成一堆废铁，而榴弹炮将帮助您对付近距离的敌人。"
"madGamesEvent/Currencies/Biogas/Title": "沼气"
"madGamesEvent/Currencies/Biogas/Terms": "• 只要在常规战斗和Mad Games中得到至少300点战斗经验就可以获得。\n• 战斗中使用坦克的等级越高，获得的沼气就越多。\n• 排位战中获得胜利不计入其中。"
"madGamesEvent/Currencies/Cookies/Title": "饼干"
"madGamesEvent/Currencies/Victories/Title": "胜利"
"madGamesEvent/Currencies/Victories/Terms": "• 获得50场常规战斗或Mad Games战斗的胜利以赢得Scavenger。\n• 排位战中获得胜利不计入其中。"
