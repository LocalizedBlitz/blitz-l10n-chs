"hangar/battleType/ratingDescription": "与势均力敌的对手作战，赚取评级分，在排行榜上攀升，从一个联赛晋级到下一个！\n特点：\n• 玩家按个人评级进行匹配。\n• 可使用装备顶级模块和100%乘员熟练度的坦克参加排位战。\n• 需要参加10场定级战斗来确定初始评级。结束后您将进入五级联赛之一：青铜、白银、黄金、铂金或钻石。\n• 排位战获胜比常规战斗获得更多经验和银币。"
"hangar/battleType/regularDescription": "基础战斗模式。\n特点：\n• 可以玩遭遇战模式（I–X级坦克）或优势模式（V–X级坦克）。\n• 遭遇战胜利需要摧毁所有敌坦或占领基地。\n• 优势模式胜利需要摧毁敌坦和占领点来积累1000分，或直接摧毁所有敌坦。\n• 所有战斗计入统计。"
