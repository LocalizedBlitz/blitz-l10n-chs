"#achievements:sniper_condition": "• 包含未穿透攻击。\n• 不允许对友军造成直接攻击。\n• 如果两个或更多玩家命中率相同，则荣誉授予命中次数更多的玩家。\n• 如果命中率和命中次数都相同，则授予获得经验最高的玩家。\n• 荣誉一场战斗仅颁发一次。"
"#achievements:steelwall_condition": "• 战斗中幸存。\n• 如果两个或更多玩家承受潜在伤害值相同，则荣誉授予被承受攻击次数更多的玩家。\n• 如果承受的潜在伤害值和被攻击次数都相同，则授予获得经验最高的玩家。\n• 此荣誉一场仅颁发一次。"
