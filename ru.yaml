"GunMark/OverlayInfo/MoreInfo": "<t-caption_highlighted>如何获得精通标记？</t-caption_highlighted><br/>• 精通标记根据<t-child_highlighted>战斗效能</t-child_highlighted>发放。您的场均伤害相比其他使用同一坦克的玩家越高，炮管上的标记就越多。<br/>• 要获得<t-child_highlighted>一个</t-child_highlighted>精通标记，您需要跻身场均伤害排名前<t-child_highlighted>35%</t-child_highlighted>的玩家。<br/>• <t-child_highlighted>两个</t-child_highlighted>精通标记，需要跻身场均伤害排名前<t-child_highlighted>25%</t-child_highlighted>的玩家。<br/>• <t-child_highlighted>三个</t-child_highlighted>精通标记，需要跻身场均伤害排名前<t-child_highlighted>10%</t-child_highlighted>的玩家。<br/><br/><t-caption_highlighted>效能指标如何计算？</t-caption_highlighted><br/>• 计算时考虑<t-child_highlighted>最近100场标准模式战斗</t-child_highlighted>中该特定坦克的<t-child_highlighted>场均伤害</t-child_highlighted>。<br/><br/><t-caption_highlighted>还有哪些注意事项？</t-caption_highlighted><br/>• 已获得的精通标记不会因您的效能下降而消失。<br/>• 如果您的场均伤害数据异常出色，有可能在完成100场战斗之前就获得精通标记。"
