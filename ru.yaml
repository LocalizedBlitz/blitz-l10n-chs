"#achievements:camper_condition": "• 射击至少8次。\n• 至少80%的射击造成伤害，包含对乘员和模块的伤害。\n• 命中率不低于85%。\n• 造成的伤害必须超过玩家自身生命值且不得低于1000点。\n• 如果两名以上玩家造成的伤害相同，则授予本场获得经验较高的玩家。\n• 该成就每场战斗只发放一次。"
"#achievements:mainGun": "大口径"
