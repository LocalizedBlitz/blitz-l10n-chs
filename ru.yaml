"hangar/battleType/regularHeader": "普通"
"hangar/battleType/ratingHeader": "评级"
"battleType/hellgames": "复生"
"hangar/battleType/hellgamesDescription": "用您的坦克的秘术能力攻击敌人，即使被摧毁也能继续战斗！\n特点：\n• 每场战斗坦克可以重生两次。\n• 每次重生后，坦克将隐形几秒并获得速度加成。\n• 战斗过程中，您将逐渐累积圣水。表现越好，获得的圣水越多！\n• 从战斗开始，每辆坦克都有一个预设的主动能力，该能力取决于坦克类型，并在战斗中手动激活。\n• 还有被动能力，可以在每次重生前用累积的圣水购买。圣水越多，可安装的能力越多。它们持续生效，无需手动激活。\n• 所有获得的能力保留一整场战斗。\n• 战斗采用遭遇战规则，持续9分钟，不会影响统计数据。"
"hangar/battleType/hellgamesHeader": "复生"
"hangar/battleType/hellgamesShortDescription": "死而复生！坦克转化为拥有超能力的吸血鬼、猎人、狼人。"
"hangar/battleType/moonFightHeader": "重力"
"hangar/battleType/moonFightShortDescription": "让自己进入低重力状态！来回弹跳，漂浮在空中，看着你的敌人飞啊飞-走…\n爆炸！"
"#artefacts:jump/name": "助推器"
"#artefacts:jump/descr": "使您的坦克向上或向移动方向跳跃。\n\n移动时，坦克越轻越快，跳跃地就越高越远。\n"
"#battle:Message/Equipment/jump_ability_in_use": "助推器已在使用中。"
"#battle:Message/Equipment/jump_ability_in_cooldown": "助推器冷却中。"
"battleType/nanomaps": "突击战"
"hangar/battleType/nanomapsDescription": "小地图——疯狂动态！\n特点：\n• 战斗在地图的某些限定区域内进行。\n• 每队5辆坦克。\n• 基地尺寸缩小，占领速度更快。\n• 战斗采用遭遇战规则，持续7分钟，不会影响统计数据。"
"hangar/battleType/nanomapsHeader": "5v5突击战"
"hangar/battleType/nanomapsShortDescription": "加入5v5的小规模冲突！在近距离战斗中消灭敌人！"
"battleType/vampiric": "Burning Games"
"hangar/battleType/vampiricDescription": "行动迅速果断——在战斗中治疗自己和队友，即使被摧毁也能重返战斗！\n特点：\n• 战斗开始后12秒，坦克的生命值开始减少，直到生命值降至1点。\n• 为了生存，向敌人射击以治疗自己，并射击队友以治疗他们。\n• 如果您的坦克被摧毁，您还能再回到战斗两次。每次都会提升坦克的某些属性：伤害、发动机功率、装填时间和最大速度。\n• 被摧毁后，坦克会爆炸并对周围20米范围内的敌人造成伤害。\n• 战斗采用争霸战模式。占领据点——这样您可以为整个队伍补充生命值并降低生命值减少速度。\n• 战斗持续9分钟，不会影响统计数据。"
"hangar/battleType/vampiricHeader": "BURNING GAMES"
"hangar/battleType/vampiricShortDescription": "坦克逐渐损失生命值。别被烧死了！击中队友可以治疗队友，击中敌人可以治疗自己！"
