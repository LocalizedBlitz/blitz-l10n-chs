"#achievements:markOfMastery_descr": "授予玩家对其坦克的精通程度。\n要获得该奖励，您需要在本场战斗中获得的经验高于该坦克上99%玩家一周内的平均最大经验。\n如果VI–X级坦克在战斗中获得“王牌”等级标志，还将获得更多银币：\n• VI级：20000\n• VII级：40000\n• VIII级：60000\n• IX级：80000\n• X级：100000"
"#achievements:markOfMasteryI_descr": "授予玩家对其坦克的精通程度。\n要获得该奖励，您需要在本场战斗中获得的经验高于该坦克上95%玩家一周内的平均最大经验。\n如果VI–X级坦克在战斗中获得“1级”等级标志，还将获得更多银币：\n• VI级：6000\n• VII级：12000\n• VIII级：18000\n• IX级：24000\n• X级：30000"
"#achievements:markOfMasteryII_descr": "授予玩家对其坦克的精通程度。\n要获得该奖励，您需要在本场战斗中获得的经验高于该坦克上80%玩家一周内的平均最大经验。\n如果VI–X级坦克在战斗中获得“2级”等级标志，还将获得更多银币：\n• VI级：2000\n• VII级：4000\n• VIII级：6000\n• IX级：8000\n• X级：10000"
"#achievements:markOfMasteryIII_descr": "授予玩家对其坦克的精通程度。\n要获得该奖励，您需要在本场战斗中获得的经验高于该坦克上50%玩家一周内的平均最大经验。\n如果VI–X级坦克在战斗中获得“3级”等级标志，还将获得更多银币：\n• VI级：1000\n• VII级：2000\n• VIII级：3000\n• IX级：4000\n• X级：5000"
