"hangar/battleType/gravitizingHeader": "重力再生"
"hangar/battleType/gravitizingShortDescription": "复生和重力的酷炫结合！启用神秘的能力，投身到月球重力之中！"
"battleType/gravitizing": "重力再生"
"hangar/battleType/gravitizingDescription": "重生吧，在地面上滑翔，获得太空般的游戏体验！\n特性：\n• 模式融合了“重力”和“复生”的精华。\n• “复生”的主要特性：每场战斗可重生两次、能力以及圣水（累积圣水并购买额外能力）。\n• “重力”的主要特性：低重力、飞行中操控坦克、坠落伤害降低、坦克加速移动。\n• 与“重力”和“复生”的不同之处：关闭了“火箭引擎”能力，重生后无速度加成，部分能力有所调整。\n• 战斗采用遭遇战规则，持续9分钟，不计入统计数据。"
"#artefacts:curse_gravitizing/name": "血痕"
"#artefacts:curse_gravitizing/descr": "瞄准敌方坦克并激活能力。10秒内，敌方坦克移动将损失生命值。\n\n每移动10米损失最大生命值的3.5%。\n\n此为预装能力且不能出售或更改。所有其他能力仅战斗中可获取。\n"
"provisions/duplet_gravitizing/Name": "双重射击"
"provisions/duplet_gravitizing/Description": "使您每次射出2发炮弹。"
"#artefacts:moonwalk_gravitizing/name": "阴影"
"#artefacts:moonwalk_gravitizing/descr": "激活时，阴影使您的坦克对敌人隐形并提升速度，发起攻击或受到伤害时失效。\n%(enginePowerFactor)引擎动力。\n+10千米/时最高速度。\n此为预装能力且不能出售或更改。所有其他能力仅战斗中可获取。"
"hangar/battleType/tenvstenHeader": "10v10"
"hangar/battleType/tenvstenShortDescription": "10名车长一队，与同等人数的敌方团队展开战斗。此模式允许最多3名玩家组成小队参战。"
"battleType/tenvsten": "10v10"
"hangar/battleType/tenvstenDescription": "规则：\n\n• 战斗中每队拥有10辆坦克。\n• 在此模式下，最多允许3名玩家组成小队。\n• 大多数V-X级坦克均符合资格。\n• 没有特殊的匹配要求。\n• 战斗采用争霸战或遭遇战模式，并且不会影响您的统计数据。\n• 您可能无法在夜间或晚上进行战斗，具体取决于您所在的地区。"
