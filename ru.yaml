"#achievements:beasthunter_condition": "	• Tiger II\n	• Panther\n	• Panther II\n	• Panther/M10\n	• Panther 8,8\n	• Bretagne Panther\n	• Jagdpanther\n	• Jagdpanther II\n	• Tiger (P)\n	• Tiger I\n	• Jagdtiger\n	• Jagdtiger 8,8\n	• Snowstorm Jagdtiger 8,8\n	• Leopard Prototyp A\n	• Leopard 1\n	• Löwe\n	• Tiger Lightning\n	• VK 16.02 Leopard\n	• Tiger 131\n	• Pudel\n	• Т-V/85\n	• Aufklärungspanzer Panther\n\n• 包含所有坦克的战绩。\n• 重复获取荣誉将合并统计。"
"#achievements:bombardier_condition": "• 所有坦克达成的战绩合并统计。"
"#achievements:defender_condition": "• 降低至少70占领分数。\n• 如果两名或两名以上玩家获得的分数相同，则颁发给获取经验最高的玩家。\n• 该荣誉每场战斗只颁发一次。\n• 不包含争霸战的占领分数。"
"#achievements:diehard_condition": "• 使用同一辆坦克继续下一场将保持连续纪录。\n• 每辆坦克战绩单独统计，仅记录最高分数。"
"#achievements:diehard_descr": "使用同一辆坦克在连续10场战斗中幸存。"
"#achievements:evileye_condition": "• 在敌方坦克受到伤害时，必须是唯一能侦测到目标的坦克。\n• 如果多名玩家协助友军点并击伤相同数量的敌方坦克，则该荣誉授予本场获得经验最多的玩家。\n• 该荣誉在一场战役中仅可获得一次。"
"#achievements:evileye_descr": "侦查协助团队击伤3辆以上敌车。"
"#achievements:handOfDeath_condition": "• 使用同一辆坦克进入下场战斗将继续统计未打破的连续纪录。\n• 每辆坦克战绩单独统计，仅记录最高分数。\n• 这项荣誉在连击结束后予以颁发。"
