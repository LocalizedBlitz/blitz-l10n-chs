"#artefacts:hunters_mark/name": "辐射器"
"#artefacts:hunters_mark/descr": "激活辐射器时，全体友军对您在瞄准的敌方坦克造成的伤害提高45%。<br/><br/>• 当改装道具生效时，激活辐射器能力的玩家在小地图上可见。\n• 如果被影响的敌方坦克在小地图上消失，效果会提前消失。\n• 无法对已经被辐射器影响的坦克使用辐射器。<br/><br/>"
"hangar/battleType/arcadeDescription": "隐身、修复损伤、惊人速度和毁灭性撞击——进入最狂野的游戏模式，借助疯狂改装取得胜利！\n特点：\n• 坦克获得改装件——非标准强化，赋予它们新能力。\n• 根据战斗角色，为每辆坦克装配1个主动改装件和1个被动改装件。\n• 主动改装件可手动激活，如同消耗品。它们包括：辐射器、变色龙伪装、半衰期释放、高辛烷值燃料、加速器和伤害反弹。\n• 被动改装件会像物资一样自动激活。它们包括：装甲再生器、重型冲撞器、战斗协调器、破坏者系统、铀盾和剧毒凝视。\n• 战斗采用遭遇战模式。\n• 战斗持续5分钟，不纳入统计。"
