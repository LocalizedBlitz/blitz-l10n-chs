"2026-BIG-FORGE/currency/win/terms": "• 使用IV–X级坦克每场胜利可获得1枚勇气代币。\n• 联赛战斗不提供勇气代币。\n• 升级射击训练场，战斗中取得精通徽章时可获得更多勇气代币。\n• 升级维修站，每日登录时可获得更多勇气代币。\n• 想要在胜利时获得勇气代币，您需要获得足够的战斗经验（不含加成）：<br/><br/>%(drop)"
"2026-big-forge-str-energypump_descr": "每24小时产出勇气代币。每日登录游戏即可领取！\n使用银币建造维修站。在各个阶段与集装箱中寻找升级材料，并用于升级维修站。维修站等级越高，产出的勇气代币越多。"
"2026-big-forge-str-free-reward-100_title": "路线起点"
"2026-big-forge-str-free-reward-100_descr": "迷雾中潜伏着危险、秘密，还有您的目标——Prowler。选择一条道路，立即出发。时间紧迫！\n• 士兵之路：用勇气代币推进。通过赢得战斗胜利获取代币。\n• 佣兵之路：用金币推进，奖励更丰厚。\n在此免费领取升级材料，用于强化维修站与射击训练场。"
"2026-big-forge-str-gold_descr": "佣兵之路属于那些锁定目标就绝不回头的人。野心——还有金币——总能带来结果。\n用金币领取奖励。"
"2026-big-forge-str-freeprx_descr": "曲折的士兵之路将考验您的意志。坚持下去，相信直觉，您终将成功。\n用勇气代币领取奖励。想要获得勇气代币，需要驾驶IV–X级坦克赢得战斗。"
"2026-big-forge-str-freeprx-106_title": "误入歧途"
"2026-big-forge-str-freeprx-106_descr": "这是条死胡同……却有一座加固帐篷！沙袋间藏着一个临时厨房。您找到了一套完整的军用餐具，一尘不染。\n用勇气代币领取奖励。"
"2026-big-forge-str-quest-campfire-1_title": "篝火任务#1"
"2026-big-forge-str-quest-campfire-1_descr": "熊熊篝火在战火纷飞的背景下燃烧。卸下重担，稍作休息。或许还能找点吃的……\n领取任务后，在仓库中找到它，启动计时器，完成任务即可获得“将军的鲭鱼#1”。"
"2026-big-forge-str-quest-campfire-1-reward_title": "营养补给"
"2026-big-forge-str-quest-campfire-1-reward_descr": "看起来平平无奇，但对士兵而言……却是难得的美味。这意味着它在战壕里值点钱。\n用“将军的鲭鱼#1”兑换奖励。"
"2026-big-forge-str-quest-campfire-2_title": "篝火任务#2"
"2026-big-forge-str-quest-campfire-2_descr": "远处枪声回荡，但这座营地看似安全。若小心行事，或许能弄点食物。\n领取任务后，在仓库中找到它，启动计时器，完成任务即可获得“将军的鲭鱼#2”。"
"2026-big-forge-str-quest-campfire-2-reward_title": "诚信交易"
"2026-big-forge-str-quest-campfire-2-reward_descr": "您遇到一个正想要此物的人。最好考虑一下他的交易提议。\n用“将军的鲭鱼#2”兑换升级材料。用于强化维修站与射击训练场。"
"2026-big-forge-str-quest-campfire-3_title": "篝火任务#3"
"2026-big-forge-str-quest-campfire-3_descr": "微弱的篝火吸引着您靠近。您坐下清点弹药，肚子却咕咕叫。是时候找点食物了。\n领取任务后，在仓库中找到它，启动计时器，完成任务即可获得“将军的鲭鱼#3”。"
"2026-big-forge-str-quest-campfire-3-reward_title": "风衣之下"
"2026-big-forge-str-quest-campfire-3-reward_descr": "一个独行佣兵掀开外套，露出一捆银币。他朝您手中的鱼罐头仰了仰头——似乎想交易。\n用“将军的鲭鱼#3”兑换奖励。"
"2026-big-forge-str-freeprx-1190_title": "蜿蜒战壕"
"2026-big-forge-str-freeprx-1190_descr": "深邃的战壕迷宫遍布残骸，但您看到前方道路有东西在闪光。或许很值钱……\n用勇气代币领取奖励并继续前进。"
"2026-big-forge-str-freeprx-1200_title": "蜿蜒战壕"
"2026-big-forge-str-freeprx-1200_descr": "您审视着崎岖的战壕。前方道路平坦干燥，直觉告诉您应该沿此路前行……\n用勇气代币领取奖励并继续前进。"
"2026-big-forge-str-freeprx-1210_title": "蜿蜒战壕"
"2026-big-forge-str-freeprx-1210_descr": "这条战壕小径积水严重，到处是弹壳。俗话说，不入虎穴，焉得虎子……\n用勇气代币领取奖励并继续前进。"
"2026-big-forge-str-freeprx-1220_title": "战壕之中"
"2026-big-forge-str-freeprx-1220_descr": "脚下泥泞，远处枪声不断。每个方向看起来都一模一样。哪条岔路通往前方，哪条又是死胡同？\n用勇气代币领取奖励。"
"2026-big-forge-str-freeprx-1230_title": "战壕之中"
"2026-big-forge-str-freeprx-1230_descr": "又一个转角。烟雾在头顶飘散，枪声震得泥土簌簌落下。您能否找到出路，或是一头扎进未知？\n用勇气代币领取奖励。"
"2026-big-forge-str-freeprx-1240_title": "战壕之中"
"2026-big-forge-str-freeprx-1240_descr": "战壕两侧堆满沙袋与碎裂木板，您看不到下一个转角之后的情景。每向前一步，都是对未知的豪赌。\n用勇气代币领取奖励。"
"2026-big-forge-str-freeprx-1250_title": "战壕之中"
"2026-big-forge-str-freeprx-1250_descr": "迷宫再次收窄。低沉的硝烟，掩蔽了隆隆的炮声。这是死路，还是出路？\n用勇气代币领取奖励。"
"2026-big-forge-str-freeprx-1260_title": "战壕之中"
"2026-big-forge-str-freeprx-1260_descr": "没有明确的道路，也没有安全的方向。唯有继续前行的勇气，无论前方有什么。\n用勇气代币领取奖励。"
"2026-big-forge-str-freeprx-1270_title": "战壕之中"
"2026-big-forge-str-freeprx-1270_descr": "您感觉自己被永远困在了这些战壕之中。墙壁一成不变，转角无穷无尽。真的有出口吗？\n用勇气代币领取奖励。"
"2026-big-forge-str-freeprx-1280_title": "意外发现"
"2026-big-forge-str-freeprx-1280_descr": "终于！迷宫将您带入一处破败的壁龛。中央放着一个风化斑驳的士兵行军包，里面塞满了补给——这是您应得的奖励。\n用勇气代币领取奖励。"
"2026-big-forge-str-freeprx-1380_title": "偏离正轨"
"2026-big-forge-str-freeprx-1380_descr": "战场的混乱让您迷失了方向。不妨称之为“迂回”，稍微探索一下。\n用勇气代币领取奖励并继续前进。"
"2026-big-forge-str-freeprx-1410_title": "探索之心"
"2026-big-forge-str-freeprx-1410_descr": "您在林中漫无目的地走了数小时，仿佛走进了死胡同。至少找到了一篮新鲜蘑菇——能煮锅好汤。\n用勇气代币领取奖励。"
"2026-big-forge-str-freeprx-147_title": "越野远征"
"2026-big-forge-str-freeprx-147_descr": "您仔细搜寻森林中的洞穴与林间空地。附近一定藏着什么有趣的东西。也许地平线上的防火守望塔藏着线索？\n用勇气代币领取奖励。"
"2026-big-forge-str-quest-tower_title": "防火守望塔任务"
"2026-big-forge-str-quest-tower_descr": "您发现一处废弃营地。桌上放着半份未吃完的午餐。四周树木布满弹孔，似曾遭袭。您握紧武器，环顾四周……\n领取任务后，在仓库中找到它，启动计时器，完成任务即可获得“守望者吊坠”。"
"2026-big-forge-str-cabin_title": "守望者小屋"
"2026-big-forge-str-cabin_descr": "当地的守望者住在这里。他热情地为您端上热腾腾的饭菜，随后却突然落泪——他最近在防火守望塔附近弄丢了纪念挚友的信物。也许您能帮忙找回？\n找到守望者丢失的信物并归还给他。"
"2026-big-forge-str-trainyard_descr": "使您在战斗中取得精通徽章时获得更多勇气代币。\n使用银币建造射击训练场。 在各个阶段与集装箱中寻找升级材料，并用于升级射击训练场。 射击训练场等级越高，可获得的勇气代币越多。"
"2026-big-forge-str-tank_descr": "这是您的最终目标——Prowler。有了这台机器，您将彻底掌控无人区。\n通过士兵之路或佣兵之路到达这一步。"
"2026-big-forge-str-freeprx-upgrade_descr": "用勇气代币领取升级材料。使用升级材料强化维修站和射击训练场。"
"2026-big-forge-str-freexp-chest_descr": "用全局经验开启。\n点击下方集装箱，然后点击下一屏上相同的卡片，即可查看其中包含的物品。"
"2026-big-forge-str-free-prx-chest_descr": "用勇气代币开启。\n点击下方集装箱，然后点击下一屏上相同的卡片，即可查看其中包含的物品。"
"2026-big-forge-str-gold-chest_descr": "用金币开启。\n点击下方集装箱，然后点击下一屏上相同的卡片，即可查看其中包含的物品。"
"2026-big-forge-str-air-chest_descr": "使用斧头开启。在商店中购买对应礼包可获得斧头。\n点击下方集装箱，然后点击下一屏上相同的卡片，即可查看其中包含的物品。"
"2026-big-forge-str-entrance_descr": "总部是最后的安全堡垒。探索得越远，危险就越大。准备好物资，随时应对一切。\n建造总部，继续您的征程。"
