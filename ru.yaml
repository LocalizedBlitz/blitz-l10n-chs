"#achievements:titleSniper_condition": "• 连击统计在一次未命中攻击后停止。\n• 每辆坦克的记录单独统计，在后续战斗中使用相同坦克，继续统计连击次数。\n• 仅记录最高的连击次数。"
"#achievements:warrior_condition": "• 如果比分相同，则授予本场造成伤害较高的玩家。\n• 该成就每场战斗只发放一次。<br/><br/>如果VI–X级坦克在战斗中获得勇士成就，还会获得更多银币：<br/>• VI级：8000<br/>• VII级：16000<br/>• VIII级：24000<br/>• IX级：32000<br/>• X级：40000"
